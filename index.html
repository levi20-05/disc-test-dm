<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --D:#E24B4A;--D-bg:#FCEBEB;--D-txt:#A32D2D;
    --I:#EF9F27;--I-bg:#FAEEDA;--I-txt:#633806;
    --S:#1D9E75;--S-bg:#E1F5EE;--S-txt:#085041;
    --C:#378ADD;--C-bg:#E6F1FB;--C-txt:#0C447C;
    --bg:#f8f9fa;--surface:#fff;--border:#e0e0e0;
    --text:#1a1a1a;--text2:#555;--text3:#888;
    --radius:10px;--radius-sm:6px;
  }
  body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  .app{max-width:700px;margin:0 auto;padding:20px 16px 60px}
  .logo{text-align:center;padding:24px 0 8px;font-size:13px;color:var(--text3);font-weight:500;letter-spacing:1px;text-transform:uppercase}
  .logo span{color:#378ADD;font-weight:700}

  /* NAV */
  .nav{display:flex;gap:6px;margin-bottom:24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:6px}
  .nav-btn{flex:1;padding:8px 4px;border:none;background:transparent;border-radius:var(--radius-sm);cursor:pointer;font-size:12px;color:var(--text2);transition:all .15s;font-family:inherit}
  .nav-btn.active{background:#378ADD;color:#fff;font-weight:500}
  .nav-btn:hover:not(.active){background:#f0f0f0}

  /* LANG TOGGLE */
  .lang-bar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:12px}
  .lang-btn{padding:4px 12px;border:1px solid var(--border);border-radius:20px;background:transparent;cursor:pointer;font-size:12px;color:var(--text2);font-family:inherit}
  .lang-btn.active{background:#378ADD;color:#fff;border-color:#378ADD}

  /* CARDS */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px}
  .card-sm{padding:14px 16px}

  /* BUTTONS */
  .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:1px solid var(--border);border-radius:var(--radius-sm);background:transparent;cursor:pointer;font-size:14px;color:var(--text);font-family:inherit;transition:all .15s}
  .btn:hover{background:#f0f0f0}
  .btn-primary{background:#378ADD;border-color:#378ADD;color:#fff}
  .btn-primary:hover{background:#185FA5}
  .btn-sm{padding:6px 14px;font-size:13px}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}

  /* PROGRESS */
  .progress{height:6px;background:#eee;border-radius:3px;overflow:hidden;margin:8px 0 20px}
  .progress-fill{height:100%;border-radius:3px;background:#378ADD;transition:width .4s}

  /* DISC BADGES */
  .disc-badge{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:50%;font-size:18px;font-weight:700;color:#fff}
  .badge-D{background:var(--D)}.badge-I{background:var(--I)}.badge-S{background:var(--S)}.badge-C{background:var(--C)}
  .pill{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;margin:3px}

  /* SCORE BARS */
  .score-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .score-label{width:20px;font-weight:700;font-size:14px}
  .score-bar-wrap{flex:1;height:10px;background:#eee;border-radius:5px;overflow:hidden}
  .score-bar{height:100%;border-radius:5px;transition:width .6s}
  .score-pct{width:36px;text-align:right;font-size:13px;color:var(--text2)}

  /* GRID */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}

  /* DOMAIN SELECT */
  .domain-chip{padding:8px 14px;border:1.5px solid var(--border);border-radius:20px;cursor:pointer;font-size:13px;background:var(--surface);transition:all .15s;margin:4px}
  .domain-chip.selected{background:#378ADD;border-color:#378ADD;color:#fff}

  /* TABLE */
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;padding:10px 12px;background:#f5f5f5;border-bottom:1px solid var(--border);font-weight:500;color:var(--text2)}
  td{padding:10px 12px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
  tr:hover td{background:#fafafa}

  /* HIDDEN */
  .page{display:none}.page.active{display:block}

  /* COLLAB MATRIX */
  .matrix-cell{padding:12px;border-radius:var(--radius-sm);font-size:13px;line-height:1.6}
  
  /* PRINT / PDF styles */
  @media print{
    .nav,.lang-bar,.btn-row,.no-print{display:none!important}
    .app{padding:0;max-width:100%}
    .card{break-inside:avoid;border:1px solid #ccc}
  }

  /* RESPONSIVE */
  @media(max-width:480px){
    .grid2{grid-template-columns:1fr}
    .grid4{grid-template-columns:repeat(2,1fr)}
  }
</style>

function getHistory(){try{return JSON.parse(localStorage.getItem('disc_history')||'[]')}catch{return[]}}
function saveToHistory(entry){
  const h=getHistory();
  h.unshift(entry);
  if(h.length>50)h.pop();
  localStorage.setItem('disc_history',JSON.stringify(h));
}
function clearHistory(){localStorage.removeItem('disc_history')}

function goPage(p){
  state.page=p;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+p).classList.add('active');
  renderCurrentPage();
}
function renderCurrentPage(){
  ['quiz','history','dashboard','about'].forEach(p=>{
    document.getElementById('page-'+p).classList.toggle('active', state.page===p);
  });
  if(state.page==='quiz') renderQuiz();
  if(state.page==='history') renderHistory();
  if(state.page==='dashboard') renderDashboard();
  if(state.page==='about') renderAbout();
}

function shuffle(a){return a.slice().sort(()=>Math.random()-0.5)}

function renderQuiz(){

  else if(q.step==='result') el.innerHTML = renderResult();

function startQuiz(){
  const nameEl = document.getElementById('participant-name');
  state.quiz.name = nameEl ? nameEl.value.trim() : '';
  state.quiz.step='question';
  state.quiz.answers=[];
  state.quiz.scores={D:0,I:0,S:0,C:0};
  state.quiz.profile=null;
  state.quiz.saved=false;
  state.quiz.domain=lang==='fr'?'Général':'General';
  renderQuiz();
}

function answer(l){
  state.quiz.scores[l]++;
  state.quiz.answers.push(l);
  if(state.quiz.answers.length===QUESTIONS[lang].length){
    state.quiz.profile=Object.entries(state.quiz.scores).sort((a,b)=>b[1]-a[1])[0][0];
    state.quiz.step='result';
  }
  renderQuiz();
}

function setDomain(d){
  state.quiz.domain=d;
  renderQuiz();
}

function showCollab(t){
  state.quiz.collab_target=t;
  state.quiz.step='collab';
  renderQuiz();
}

function backToResult(){
  state.quiz.step='result';
  renderQuiz();
}

function restartQuiz(){
  state.quiz.step='intro';
  renderQuiz();
}

function saveResult(){
  if(state.quiz.saved) return;
  const q=state.quiz;
  const now=new Date();
  const entry={
    profile:q.profile,
    scores:{...q.scores},
    name:q.name||'',
    date:now.toLocaleDateString('fr-FR'),
    timestamp:now.getTime()
  };
  saveToHistory(entry);
  state.quiz.saved=true;
  const btn=document.getElementById('save-btn');
  if(btn){btn.textContent='✓ '+t('saved');btn.classList.remove('btn-primary')}
}

function clearHistoryUI(){
  if(confirm(lang==='fr'?'Effacer tout l\'historique ?':'Clear all history?')){
    clearHistory();
    renderHistory();
  }
}

// PDF EXPORT
// ============================================================
function downloadPDF(){
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const q = state.quiz;
  if(!q.profile) return;
  const data = DISC_DATA[lang][q.profile];
  const total = Object.values(q.scores).reduce((a,b)=>a+b,0);
  const color = {D:[226,75,74],I:[239,159,39],S:[29,158,117],C:[55,138,221]};
  const c = color[q.profile];

  // Header band
  doc.setFillColor(...c);
  doc.rect(0,0,210,40,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(22);doc.setFont('helvetica','bold');
  doc.text('DISC — '+data.name, 20, 18);
  doc.setFontSize(11);doc.setFont('helvetica','normal');
  doc.text((q.name?q.name+' · ':'')+'DM Academy · '+new Date().toLocaleDateString('fr-FR'), 20, 28);
  doc.text('Profil dominant : '+q.profile+' ('+Math.round(q.scores[q.profile]/total*100)+'%)', 20, 36);

  let y=52;
  // Description
  doc.setTextColor(40,40,40);
  doc.setFontSize(10);doc.setFont('helvetica','normal');
  const descLines=doc.splitTextToSize(data.desc,170);
  doc.text(descLines,20,y);y+=descLines.length*5+8;

  // Scores
  doc.setFillColor(245,245,245);doc.rect(15,y,180,6+Object.keys(q.scores).length*8,'F');
  doc.setFontSize(9);doc.setFont('helvetica','bold');
  doc.setTextColor(80,80,80);doc.text(t('score_dist').toUpperCase(),20,y+5);y+=10;
  Object.entries(q.scores).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>{
    const pct=Math.round(v/total*100);
    const kc=color[k];
    doc.setFont('helvetica','bold');doc.setTextColor(...kc);
    doc.text(k,20,y);
    doc.setFillColor(...kc);
    doc.rect(30,y-4,pct*1.3,5,'F');
    doc.setTextColor(80,80,80);doc.setFont('helvetica','normal');
    doc.text(pct+'%',138,y);
    y+=8;
  });y+=6;

  // Forces & Défis
  const col=(title,items,tx,ty)=>{
    doc.setFont('helvetica','bold');doc.setTextColor(80,80,80);doc.setFontSize(9);
    doc.text(title.toUpperCase(),tx,ty);ty+=6;
    doc.setFont('helvetica','normal');doc.setTextColor(60,60,60);
    items.forEach(i=>{doc.text('• '+i,tx,ty);ty+=6;});
    return ty;
  };
  const yf=col(t('strengths'),data.forces,20,y);
  const yd=col(t('challenges'),data.defis,110,y);
  y=Math.max(yf,yd)+6;

  // Métiers
  const defDomain=lang==='fr'?'Général':'General';
  const metiers=data.metiers[q.domain]||data.metiers[defDomain];
  doc.setFont('helvetica','bold');doc.setTextColor(80,80,80);doc.setFontSize(9);
  doc.text((t('sectors')+' ('+q.domain+')').toUpperCase(),20,y);y+=6;
  doc.setFont('helvetica','normal');doc.setTextColor(60,60,60);
  metiers.forEach(m=>{doc.text('→ '+m,22,y);y+=6;});
  y+=6;

  // Collaboration tips
  doc.setFont('helvetica','bold');doc.setTextColor(80,80,80);doc.setFontSize(9);
  doc.text(t('collab_title').toUpperCase(),20,y);y+=7;
  ['D','I','S','C'].forEach(k=>{
    if(y>270){doc.addPage();y=20;}
    const kc=color[k];
    doc.setFillColor(...kc);doc.rect(20,y-4,8,6,'F');
    doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(8);
    doc.text(k,22.5,y);
    doc.setTextColor(60,60,60);doc.setFont('helvetica','normal');doc.setFontSize(9);
    const lines=doc.splitTextToSize(data.collab[k],148);
    doc.text(lines,34,y);y+=lines.length*5+4;
  });

  // Footer
  doc.setFontSize(8);doc.setTextColor(160,160,160);
  doc.text('DM Academy · Abobo, Abidjan, Côte d\'Ivoire · Outil DISC',20,290);

  doc.save('DISC_'+q.profile+'_'+(q.name||'profil')+'_'+new Date().toLocaleDateString('fr-FR').replace(/\//g,'-')+'.pdf');
}

// ============================================================
// INIT
// ============================================================
renderCurrentPage();
</script>
</body>
